
<div class="container skillsWrap">
  <div class="arrow arrowTop" aria-hidden="true"></div>
  <section class="skillsPanel">
    <h2 class="panelTitle">{{ 'skills.title' | t }}</h2>
    <div class="iconGrid" aria-label="Tech stack">
      <figure class="skillItem" *ngFor="let item of techIcons">
        <img class="skillIcon" [src]="item.icon" [alt]="item.labelKey | t" loading="lazy" decoding="async" width="72" height="72" />
        <figcaption>{{ item.labelKey | t }}</figcaption>
      </figure>
    </div>
    <div class="skillNote">
      <span class="noteIcon" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 2.5 2.5 9.2v5.6L12 21.5l9.5-6.7V9.2L12 2.5Zm0 2.4 7.3 5.1L12 15.1 4.7 10 12 4.9Zm-7 7.2 6.2 4.4v2.7L5 14.7v-2.6Zm14 0v2.6l-6.2 4.4v-2.7l6.2-4.4Z"/></svg>
      </span>
      <p>{{ 'skills.note.before' | t }} <button type="button" class="contactLink" (click)="goTo('contact')">{{ 'skills.note.link' | t }}</button> {{ 'skills.note.after' | t }}</p>
    </div>
  </section>
</div>
